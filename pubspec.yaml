name: avault
description: A complete secure vault application for storing and managing encrypted files, notes, passwords, and more with military-grade security.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.35.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.1.0

  # Navigation
  go_router: ^13.0.0

  # Local Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Encryption & Security
  flutter_secure_storage: ^9.2.0
  pointycastle: ^3.8.0
  encrypt: ^4.1.0
  crypto: ^3.0.3

  # Biometric
  local_auth: ^2.3.0

  # File Management
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  image_picker: ^1.0.0
  video_player: ^2.8.0

  # Image & Media
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.0
  image: ^4.1.0
  pdf: ^3.10.0
  video_thumbnail: ^0.5.3

  # UI & Design
  flutter_staggered_grid_view: ^0.7.0
  intl: ^0.19.0
  share_plus: ^7.2.0
  fluttertoast: ^8.2.0
  percent_indicator: ^4.1.0
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0

  # Device Info & Permissions
  device_info_plus: ^10.0.0
  permission_handler: ^11.4.0

  # Utils
  uuid: ^4.0.0
  connectivity_plus: ^5.0.0
  battery_plus: ^1.4.0
  package_info_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.3.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-Light.ttf
          weight: 300
